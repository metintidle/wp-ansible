---
- name: Install and configure Fail2Ban
  hosts: all
  become: yes
  tasks:
    - name: Upload security configuration file
      ansible.builtin.copy:
        src: files/security/security-rules.conf
        dest: /etc/nginx/default.d/security.conf
        owner: root
        group: root
        mode: '0644'

    - name: Uploal http security file
      ansible.builtin.copy:
        src: files/security/general.conf
        dest: /etc/nginx/conf.d/security.conf
        owner: root
        group: root
        mode: '0644'

    - name: Install Fail2Ban
      ansible.builtin.dnf:
        name: fail2ban
        state: present

    - name: Allow SSH connections
      ansible.builtin.command:
        cmd: sudo iptables -A INPUT -p tcp --dport 22 -m conntrack --ctstate NEW -j ACCEPT
      changed_when: false

    # Allow return traffic for server's outbound HTTP (so curl/wget to port 80 get responses)
    - name: Allow return traffic on port 80 (ESTABLISHED,RELATED)
      ansible.builtin.command:
        cmd: sudo iptables -A INPUT -p tcp --sport 80 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
      changed_when: false

    - name: Allow HTTPS connections
      ansible.builtin.command:
        cmd: sudo iptables -A INPUT -p tcp --dport 443 -m conntrack --ctstate NEW -j ACCEPT
      changed_when: false

    # Force HTTPS-only: block new incoming HTTP so only 443 is used for web traffic
    - name: Block new incoming connections on port 80 (HTTP)
      ansible.builtin.command:
        cmd: sudo iptables -A INPUT -p tcp --dport 80 -m conntrack --ctstate NEW -j DROP
      changed_when: false

    - name: Create Nginx unknown script filter configuration
      ansible.builtin.copy:
        src: files/fail2ban/filter/nginx-unknown-script.conf
        dest: /etc/fail2ban/filter.d/nginx-unknown-script.conf
        owner: root
        group: root
        mode: '0644'

    - name: Create Nginx PHP URL hack filter configuration
      ansible.builtin.copy:
        src: files/fail2ban/filter/nginx-php-url-hack.conf
        dest: /etc/fail2ban/filter.d/nginx-php-url-hack.conf
        owner: root
        group: root
        mode: '0644'

    - name: Create non-WordPress requests filter configuration
      ansible.builtin.copy:
        src: files/fail2ban/filter/non-wordpress-requests.conf
        dest: /etc/fail2ban/filter.d/non-wordpress-requests.conf
        owner: root
        group: root
        mode: '0644'

    - name: Create Nginx limit-req login zone filter configuration
      ansible.builtin.copy:
        src: files/fail2ban/filter/nginx-limit-req-login.conf
        dest: /etc/fail2ban/filter.d/nginx-limit-req-login.conf
        owner: root
        group: root
        mode: '0644'

    - name: Remove legacy jail.d snippets superseded by jail.local
      ansible.builtin.file:
        path: /etc/fail2ban/jail.d/nginx-unknown-script.conf
        state: absent

    - name: Create fail2ban log directory
      ansible.builtin.file:
        path: /var/log/fail2ban
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure fail2ban log files exist for recidive jail
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        owner: root
        group: root
        mode: '0644'
      loop:
        - /var/log/fail2ban/fail2ban.log
        - /var/log/fail2ban/banned-ips.log

    - name: Create custom logban action for banned IPs
      ansible.builtin.copy:
        dest: /etc/fail2ban/action.d/logban.conf
        content: |
          # Custom action to log banned IPs
          [Definition]
          actionstart =
          actionstop =
          actioncheck =
          actionban = echo "$(date '+%%Y-%%m-%%d %%H:%%M:%%S') [<name>] BANNED <ip> for <failures> failures" >> <logpath>
          actionunban = echo "$(date '+%%Y-%%m-%%d %%H:%%M:%%S') [<name>] UNBANNED <ip>" >> <logpath>

          [Init]
          logpath = /var/log/fail2ban/banned-ips.log
        owner: root
        group: root
        mode: '0644'

    - name: Deploy Fail2Ban local configuration
      ansible.builtin.copy:
        src: files/fail2ban/jail.local
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'

    - name: Create log rotation for banned IPs log
      ansible.builtin.copy:
        dest: /etc/logrotate.d/fail2ban-banned-ips
        content: |
          /var/log/fail2ban/banned-ips.log {
              daily
              rotate 30
              compress
              delaycompress
              missingok
              notifempty
              create 644 root root
              postrotate
                  /bin/systemctl reload fail2ban > /dev/null 2>&1 || true
              endscript
          }
        owner: root
        group: root
        mode: '0644'

    - name: Create script to view banned IPs
      ansible.builtin.copy:
        dest: /usr/local/bin/fail2ban-banned-ips
        content: |
          #!/bin/bash
          # Script to view fail2ban banned IPs

          case "$1" in
              "current")
                  echo "=== Currently Banned IPs ==="
                  fail2ban-client status | grep "Jail list" | sed 's/.*Jail list://' | tr ',' '\n' | while read jail; do
                      jail=$(echo $jail | xargs)
                      if [ ! -z "$jail" ]; then
                          echo "--- $jail ---"
                          fail2ban-client status "$jail" | grep "Banned IP list"
                      fi
                  done
                  ;;
              "log")
                  echo "=== Recent Banned IPs from Log ==="
                  if [ -f /var/log/fail2ban/banned-ips.log ]; then
                      tail -n 50 /var/log/fail2ban/banned-ips.log
                  else
                      echo "No banned IPs log found"
                  fi
                  ;;
              "today")
                  echo "=== Today's Banned IPs ==="
                  if [ -f /var/log/fail2ban/banned-ips.log ]; then
                      grep "$(date '+%Y-%m-%d')" /var/log/fail2ban/banned-ips.log
                  else
                      echo "No banned IPs log found"
                  fi
                  ;;
              *)
                  echo "Usage: $0 {current|log|today}"
                  echo "  current - Show currently banned IPs"
                  echo "  log     - Show recent 50 entries from banned IPs log"
                  echo "  today   - Show today's banned IPs"
                  exit 1
                  ;;
          esac
        owner: root
        group: root
        mode: '0755'

    - name: Validate Nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Reload Nginx (apply rate-limit zones before fail2ban)
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Restart Fail2Ban service
      ansible.builtin.service:
        name: fail2ban
        state: restarted
        enabled: true

    - name: Validate fail2ban filter regex (must not match legitimate editor traffic)
      ansible.builtin.shell: |
        set -euo pipefail
        logfile=$(mktemp)
        printf '%s\n' "$TEST_LINE" > "$logfile"
        output=$(fail2ban-regex "$logfile" "{{ item.filter }}" 2>&1)
        rm -f "$logfile"
        count=$(echo "$output" | awk '/^Failregex:/ {print $2; exit}')
        if [ "${count:-0}" -ne 0 ]; then
          echo "Expected 0 Failregex matches for: {{ item.name }}"
          echo "$output"
          exit 1
        fi
      args:
        executable: /bin/bash
      environment:
        TEST_LINE: "{{ item.line }}"
      loop:
        - name: wp-admin elementor 200
          filter: /etc/fail2ban/filter.d/nginx-php-url-hack.conf
          line: '1.2.3.4 - - [25/Jun/2025:10:00:00 +0000] "GET /wp-admin/post.php?action=elementor HTTP/1.1" 200 1234 "-" "Mozilla/5.0"'
        - name: admin-ajax 500
          filter: /etc/fail2ban/filter.d/nginx-php-url-hack.conf
          line: '1.2.3.4 - - [25/Jun/2025:10:00:00 +0000] "POST /wp-admin/admin-ajax.php HTTP/1.1" 500 1234 "-" "Mozilla/5.0"'
        - name: wp-admin edit 403
          filter: /etc/fail2ban/filter.d/nginx-php-url-hack.conf
          line: '1.2.3.4 - - [25/Jun/2025:10:00:00 +0000] "GET /wp-admin/edit.php HTTP/1.1" 403 1234 "-" "Mozilla/5.0"'
        - name: wp-admin elementor 200 (non-wordpress)
          filter: /etc/fail2ban/filter.d/non-wordpress-requests.conf
          line: '1.2.3.4 - - [25/Jun/2025:10:00:00 +0000] "GET /wp-admin/post.php?action=elementor HTTP/1.1" 200 1234 "-" "Mozilla/5.0"'
        - name: admin-ajax 500 (non-wordpress)
          filter: /etc/fail2ban/filter.d/non-wordpress-requests.conf
          line: '1.2.3.4 - - [25/Jun/2025:10:00:00 +0000] "POST /wp-admin/admin-ajax.php HTTP/1.1" 500 1234 "-" "Mozilla/5.0"'
        - name: elementor preview pretty-url 403
          filter: /etc/fail2ban/filter.d/non-wordpress-requests.conf
          line: '1.2.3.4 - - [25/Jun/2025:10:00:00 +0000] "GET /sample-page/?elementor-preview=abc123 HTTP/1.1" 403 1234 "-" "Mozilla/5.0"'
        - name: limit_req zone one
          filter: /etc/fail2ban/filter.d/nginx-limit-req-login.conf
          line: '2025/06/25 10:00:00 [error] 1234#5678: *9 limiting requests, excess: 5.123 by zone "one", client: 1.2.3.4, server: example.com, request: "GET / HTTP/1.1", host: "example.com"'
      changed_when: false

    - name: Validate fail2ban filter regex (must match attack patterns)
      ansible.builtin.shell: |
        set -euo pipefail
        logfile=$(mktemp)
        printf '%s\n' "$TEST_LINE" > "$logfile"
        output=$(fail2ban-regex "$logfile" "{{ item.filter }}" 2>&1)
        rm -f "$logfile"
        count=$(echo "$output" | awk '/^Failregex:/ {print $2; exit}')
        if [ "${count:-0}" -lt 1 ]; then
          echo "Expected >=1 Failregex matches for: {{ item.name }}"
          echo "$output"
          exit 1
        fi
      args:
        executable: /bin/bash
      environment:
        TEST_LINE: "{{ item.line }}"
      loop:
        - name: random php 404 probe
          filter: /etc/fail2ban/filter.d/nginx-php-url-hack.conf
          line: '1.2.3.4 - - [25/Jun/2025:10:00:00 +0000] "GET /random-probe.php HTTP/1.1" 404 1234 "-" "curl/7.88"'
        - name: shell.php hit
          filter: /etc/fail2ban/filter.d/nginx-php-url-hack.conf
          line: '1.2.3.4 - - [25/Jun/2025:10:00:00 +0000] "GET /shell.php HTTP/1.1" 200 1234 "-" "curl/7.88"'
        - name: limit_req zone security_login
          filter: /etc/fail2ban/filter.d/nginx-limit-req-login.conf
          line: '2025/06/25 10:00:00 [error] 1234#5678: *9 limiting requests, excess: 2.000 by zone "security_login", client: 1.2.3.4, server: example.com, request: "POST /wp-login.php HTTP/1.1", host: "example.com"'
      changed_when: false

    - name: Check fail2ban status
      ansible.builtin.command: fail2ban-client status
      register: fail2ban_status
      changed_when: false

    - name: Display fail2ban status
      ansible.builtin.debug:
        var: fail2ban_status.stdout_lines

    - name: Display information about banned IPs logging
      debug:
        msg: |
          Fail2ban is now configured to log banned IPs to:
          - Main log: /var/log/fail2ban/fail2ban.log
          - Banned IPs log: /var/log/fail2ban/banned-ips.log

          Use the following commands to view banned IPs:
          - fail2ban-banned-ips current  (currently banned IPs)
          - fail2ban-banned-ips log      (recent 50 log entries)
          - fail2ban-banned-ips today    (today's banned IPs)

          Or directly view the log:
          - tail -f /var/log/fail2ban/banned-ips.log