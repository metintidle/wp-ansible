---
# =============================================================================
# Fix shared WordPress DB credentials across the existing fleet.
#
# PROBLEM: every site was provisioned with the same DB_USER / DB_PASS, so one
# leaked wp-config.php grants read/write to ALL site databases on the central
# MySQL host.
#
# THIS PLAYBOOK (per host, idempotent):
#   1. Reads the live DB_NAME / DB_HOST from the site's wp-config.php.
#   2. Generates a unique DB user + strong password (recorded on the controller
#      under modules/2_wordpress/.db-credentials/, which is git-ignored).
#   3. Creates that user on the central DB and grants it privileges on ONLY
#      that site's database, bound to ONLY this host's source address
#      (user@'<this-host-ip>'), so a stolen credential is useless off-host.
#   4. Verifies the new user can actually reach the database BEFORE touching
#      wp-config.php (so a bad grant never breaks a live site).
#   5. Rewrites DB_USER / DB_PASSWORD in wp-config.php and re-verifies.
#   6. Drops any earlier over-broad user@'%' account for this site.
#   7. Applies PHP/Nginx web-shell hardening (snippets/php-webshell-hardening.yml).
#
# To force a specific grant host instead of auto-detecting, pass:
#   -e db_grant_host=1.2.3.4     (or -e db_grant_host='%' to keep wildcard)
#
# REQUIRED (set on the Ansible controller, NOT committed):
#   export DB_ADMIN_USER=...   # MySQL account with CREATE USER + GRANT OPTION
#   export DB_ADMIN_PASS=...
#
# RUN (uses your existing inventories which already wire up ~/.ssh/config):
#   ansible-playbook -i inventory/ohara-hotels.ini modules/2_wordpress/fix-db-credentials.yml
#   ansible-playbook -i inventory/wp-agent-batch.ini modules/2_wordpress/fix-db-credentials.yml
#
#   # one host at a time first, to be safe:
#   ansible-playbook -i inventory/ohara-hotels.ini modules/2_wordpress/fix-db-credentials.yml --limit berkeley
#
# AFTER all sites are migrated, retire the old shared account. NOTE: that
# account is the DB ADMIN, so do NOT DROP it or REVOKE its privileges — that
# destroys your admin and can break the server. Instead: verify it's unused,
# rotate its (compromised) password, and restrict it to your admin host.
#   1) ansible-playbook -i <inv> modules/2_wordpress/verify-shared-admin-unused.yml \
#        -e old_admin_user=<admin>
#   2) follow the manual runbook in README-db-credentials.md ("Retiring the old
#      shared admin") — rotate password, then bind it to localhost/bastion only.
# =============================================================================
- name: Migrate WordPress sites to per-site database credentials
  hosts: all
  gather_facts: false
  vars:
    wp: /usr/local/bin/wp
    docroot: "{{ wp_root | default('/home/ec2-user/html') }}"
    cred_dir: "{{ playbook_dir }}/.db-credentials"

    # MySQL admin used only to create users / grant privileges.
    db_admin_user: "{{ lookup('env', 'DB_ADMIN_USER') }}"
    db_admin_pass: "{{ lookup('env', 'DB_ADMIN_PASS') }}"

    # Client host the per-site DB user is bound to. 'auto' = detect the address
    # the central DB actually sees for this host (recommended). '%' = wildcard.
    db_grant_host: "{{ db_grant_host | default('auto') }}"

    # Per-site identity. Username kept <= 32 chars (MySQL limit) and made unique
    # with a short hash so two long hostnames can't collide.
    site_db_user: >-
      {{ ('wp_' ~ (inventory_hostname | regex_replace('[^a-zA-Z0-9]', '')))[:24]
         ~ '_' ~ (inventory_hostname | hash('md5'))[:6] }}
    # Strong password, generated once and persisted on the controller so re-runs
    # are idempotent and the value is recoverable. Alnum only => shell/SQL safe.
    site_db_pass: "{{ lookup('password', cred_dir ~ '/' ~ inventory_hostname ~ '.pass length=32 chars=ascii_letters,digits') }}"

  pre_tasks:
    - name: Fail early if DB admin credentials are not set
      run_once: true
      delegate_to: localhost
      assert:
        that:
          - db_admin_user | length > 0
          - db_admin_pass | length > 0
        fail_msg: "Set DB_ADMIN_USER and DB_ADMIN_PASS in the environment before running."

  tasks:
    - name: Read current DB_NAME from wp-config.php
      command: "{{ wp }} config get DB_NAME --path={{ docroot }}"
      register: cur_db_name
      changed_when: false

    - name: Read current DB_HOST from wp-config.php
      command: "{{ wp }} config get DB_HOST --path={{ docroot }}"
      register: cur_db_host
      changed_when: false

    - name: Resolve effective DB facts
      set_fact:
        db_name: "{{ cur_db_name.stdout | trim }}"
        db_host: "{{ cur_db_host.stdout | trim }}"

    - name: Sanity-check DB_NAME was found
      assert:
        that: db_name | length > 0
        fail_msg: "Could not read DB_NAME from {{ docroot }}/wp-config.php"

    - name: Ensure MariaDB client is present (to talk to the central DB)
      shell: |
        if command -v mysql >/dev/null; then exit 0; fi
        if command -v dnf >/dev/null; then dnf install -y mariadb105
        elif command -v yum >/dev/null; then yum install -y mariadb
        else exit 1; fi
      become: yes
      changed_when: false

    - name: Detect this host's source address as seen by the central DB
      shell: >
        mysql --user="{{ db_admin_user }}" --host="{{ db_host }}" --protocol=TCP -N -B
        -e "SELECT SUBSTRING_INDEX(USER(), '@', -1);"
      environment:
        MYSQL_PWD: "{{ db_admin_pass }}"
      register: db_src_host
      changed_when: false
      no_log: true
      when: db_grant_host == 'auto'

    - name: Resolve the grant host
      set_fact:
        grant_host: "{{ (db_src_host.stdout | trim) if db_grant_host == 'auto' else db_grant_host }}"

    - name: Sanity-check the grant host was resolved
      assert:
        that: grant_host | length > 0
        fail_msg: "Could not determine the grant host. Pass -e db_grant_host=<ip> explicitly."

    - name: Create per-site DB user, bound to this host, granted on its DB only
      shell: |
        mysql --user="{{ db_admin_user }}" --host="{{ db_host }}" --protocol=TCP -e "
        CREATE USER IF NOT EXISTS '{{ site_db_user }}'@'{{ grant_host }}' IDENTIFIED BY '{{ site_db_pass }}';
        ALTER USER '{{ site_db_user }}'@'{{ grant_host }}' IDENTIFIED BY '{{ site_db_pass }}';
        GRANT ALL PRIVILEGES ON \`{{ db_name }}\`.* TO '{{ site_db_user }}'@'{{ grant_host }}';
        FLUSH PRIVILEGES;"
      environment:
        MYSQL_PWD: "{{ db_admin_pass }}"
      no_log: true

    - name: Verify the NEW user can reach the database (before touching wp-config)
      shell: >
        mysql --user="{{ site_db_user }}" --host="{{ db_host }}" --protocol=TCP
        -e "USE \`{{ db_name }}\`; SELECT 1;"
      environment:
        MYSQL_PWD: "{{ site_db_pass }}"
      no_log: true
      changed_when: false

    # The new user works from this host. Anything connecting from elsewhere with
    # these creds is now rejected by the DB — that's the point of host binding.

    - name: Back up wp-config.php
      copy:
        src: "{{ docroot }}/wp-config.php"
        dest: "{{ docroot }}/wp-config.php.bak-predbfix"
        remote_src: yes
        force: no

    - name: Point wp-config.php at the new DB user
      command: "{{ wp }} config set DB_USER {{ site_db_user }} --path={{ docroot }}"
      no_log: true

    - name: Point wp-config.php at the new DB password
      command: "{{ wp }} config set DB_PASSWORD {{ site_db_pass }} --path={{ docroot }}"
      no_log: true

    - name: Verify WordPress can connect with the new credentials
      command: "{{ wp }} db check --path={{ docroot }}"
      register: db_check
      changed_when: false

    - name: Drop earlier over-broad wildcard account for this site (if any)
      shell: |
        mysql --user="{{ db_admin_user }}" --host="{{ db_host }}" --protocol=TCP -e "
        DROP USER IF EXISTS '{{ site_db_user }}'@'%';
        FLUSH PRIVILEGES;"
      environment:
        MYSQL_PWD: "{{ db_admin_pass }}"
      no_log: true
      when: grant_host != '%'

    - name: Record the new credentials on the controller
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ cred_dir }}/{{ inventory_hostname }}.yml"
        mode: "0600"
        content: |
          host: {{ inventory_hostname }}
          db_name: {{ db_name }}
          db_host: {{ db_host }}
          db_user: {{ site_db_user }}
          db_pass: {{ site_db_pass }}
          grant_host: {{ grant_host }}
          migrated_at: {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
      no_log: true

    - name: Summary
      debug:
        msg: "{{ inventory_hostname }}: db '{{ db_name }}' now uses user '{{ site_db_user }}'@'{{ grant_host }}' (scoped, host-bound). wp db check OK."

    # --- Web-shell hardening: disable dangerous PHP funcs for FPM, deny PHP in
    #     writable dirs, hide PHP version. See snippets/php-webshell-hardening.yml.
    - name: Apply PHP / Nginx web-shell hardening
      import_tasks: ../../snippets/php-webshell-hardening.yml
      tags: hardening
